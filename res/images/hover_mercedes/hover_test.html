<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hover Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #111; font-family: sans-serif;
  }
  #container {
    position: relative; line-height: 0;
    cursor: default; user-select: none;
  }
  #container > img { display: block; width: 100%; height: auto; }
  .glow {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
  }
  .glow.show { opacity: 1; }
  #name {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    color: #fff; font: bold 28px/1.4 sans-serif;
    background: rgba(0,0,0,.75); padding: 10px 36px; border-radius: 10px;
    display: none; letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="container">
  <img id="bg" src="all.JPG" alt="">
</div>
<div id="name"></div>

<script>
(function() {
  const container = document.getElementById('container');
  const bg = document.getElementById('bg');
  const nameEl = document.getElementById('name');

  const members = ['Alex','Catcher','Dschembi','Heiko','Jürgen','Lerry','Niko','Ralf','Stocki'];

  // bounding boxes computed from _glow.png alpha channel
  const boxes = {
    Alex:    { x:  779, y:   0, w: 1199, h: 1086 },
    Catcher: { x:    0, y:   0, w: 1446, h: 1504 },
    Dschembi:{ x: 1253, y:   0, w: 1003, h: 1311 },
    Heiko:   { x:  977, y:   0, w: 1279, h: 1313 },
    Jürgen:  { x:  193, y:   0, w: 1442, h: 1283 },
    Lerry:   { x:  441, y:   0, w: 1364, h: 1122 },
    Niko:    { x:    0, y:   0, w: 1041, h: 1504 },
    Ralf:    { x:  827, y:  55, w: 1429, h: 1449 },
    Stocki:  { x:  120, y:   0, w: 1351, h: 1237 }
  };
  const BG_W = 2256, BG_H = 1504;

  // precompute centers for tie-breaking
  const centers = {};
  for (const name of members) {
    const b = boxes[name];
    centers[name] = { cx: b.x + b.w / 2, cy: b.y + b.h / 2 };
  }

  const glows = [];

  function boot() {
    container.style.width = BG_W + 'px';

    members.forEach(name => {
      const img = document.createElement('img');
      img.className = 'glow';
      img.src = name + '_glow.png';
      container.appendChild(img);
      glows.push({ el: img, name });
    });
  }

  function hitTest(natX, natY) {
    let best = -1;
    let bestDist = Infinity;
    for (let i = 0; i < members.length; i++) {
      const name = members[i];
      const b = boxes[name];
      if (natX >= b.x && natX < b.x + b.w && natY >= b.y && natY < b.y + b.h) {
        const c = centers[name];
        const d = (natX - c.cx) ** 2 + (natY - c.cy) ** 2;
        if (d < bestDist) {
          bestDist = d;
          best = i;
        }
      }
    }
    return best;
  }

  // initialise on background load
  if (bg.complete) boot(); else bg.onload = boot;
  bg.onerror = () => { document.body.innerHTML = '<p style="color:red;padding:2em">Failed to load background image</p>'; };

  container.addEventListener('mousemove', e => {
    const r = container.getBoundingClientRect();
    const sx = BG_W / r.width;
    const sy = BG_H / r.height;
    const x = Math.floor((e.clientX - r.left) * sx);
    const y = Math.floor((e.clientY - r.top) * sy);

    const found = hitTest(x, y);
    glows.forEach(g => g.el.classList.toggle('show', g.name === members[found]));
    container.style.cursor = found >= 0 ? 'pointer' : 'default';
  });

  container.addEventListener('click', e => {
    const r = container.getBoundingClientRect();
    const sx = BG_W / r.width;
    const sy = BG_H / r.height;
    const x = Math.floor((e.clientX - r.left) * sx);
    const y = Math.floor((e.clientY - r.top) * sy);

    const found = hitTest(x, y);
    if (found < 0) return;
    nameEl.textContent = members[found];
    nameEl.style.display = 'block';
    clearTimeout(nameEl._t);
    nameEl._t = setTimeout(() => { nameEl.style.display = 'none'; }, 2000);
  });
})();
</script>
</body>
</html>
